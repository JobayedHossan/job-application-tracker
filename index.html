<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Application Tracker</title>

    <!-- Connecting CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- added dashbord section -->
<section class="dashboard">
    <h1>Job Application Tracker</h1>

    <div class="dashboard-cards">
        <div class="card">
            <h3>Total Jobs</h3>
            <p id="totalCount">0</p>
        </div>

        <div class="card">
            <h3>Interview</h3>
            <p id="interviewCount">0</p>
        </div>

        <div class="card">
            <h3>Rejected</h3>
            <p id="rejectedCount">0</p>
        </div>
    </div>
</section>

<!--available jobs section -->
<section class="jobs-section">

    <div class="jobs-header">
        <h2>Available Jobs</h2>
        <span id="tabCount">0</span>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="all">All</button>
        <button class="tab" data-tab="interview">Interview</button>
        <button class="tab" data-tab="rejected">Rejected</button>
    </div>

    <div id="jobsContainer" class="jobs-container"></div>

    <div id="emptyMessage" class="hidden">
        <h3>No jobs Available</h3>
        <p>Please add jobs to see here.</p>
    </div>

</section>
    

    <!-- Connecting JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
